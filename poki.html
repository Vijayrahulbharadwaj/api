<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Battle</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        .battle {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .pokemon {
            border: 1px solid #ccc;
            padding: 15px;
            width: 200px;
        }

        img {
            width: 120px;
        }
    </style>
</head>
<body>

    <h1>Pokémon Battle</h1>

    <button onclick="startBattle()">Start Battle</button>

    <h2 id="result"></h2>

    <div class="battle">
        <div id="pokemon1" class="pokemon"></div>
        <div id="pokemon2" class="pokemon"></div>
    </div>

    <script>
        async function getPokemon(id) {
            const response = await fetch(
                `https://pokeapi.co/api/v2/pokemon/${id}`
            );
            return await response.json();
        }

        async function startBattle() {

            const id1 = Math.floor(Math.random() * 1025) + 1;
            const id2 = Math.floor(Math.random() * 1025) + 1;

            const pokemon1 = await getPokemon(id1);
            const pokemon2 = await getPokemon(id2);

            const hp1 = pokemon1.stats[0].base_stat;
            const hp2 = pokemon2.stats[0].base_stat;

            document.getElementById("pokemon1").innerHTML = `
                <h3>${pokemon1.name.toUpperCase()}</h3>
                <img src="${pokemon1.sprites.front_default}" alt="${pokemon1.name}">
                <p>HP: ${hp1}</p>
            `;

            document.getElementById("pokemon2").innerHTML = `
                <h3>${pokemon2.name.toUpperCase()}</h3>
                <img src="${pokemon2.sprites.front_default}" alt="${pokemon2.name}">
                <p>HP: ${hp2}</p>
            `;

            let result;

            if (hp1 > hp2) {
                result = `${pokemon1.name.toUpperCase()} Wins!`;
            } else if (hp2 > hp1) {
                result = `${pokemon2.name.toUpperCase()} Wins!`;
            } else {
                result = "It's a Draw!";
            }

            document.getElementById("result").textContent = result;
        }
    </script>

</body>
</html>
