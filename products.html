<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f6f6f6;
        }

        h1 {
            text-align: center;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            padding: 16px;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: white;
        }

        .title {
            min-height: 44px;
            margin-top: 12px;
            font-weight: bold;
        }

        .price {
            color: green;
            font-weight: bold;
            margin-top: 8px;
        }

        .category {
            color: blue;
            margin-top: 6px;
            text-transform: capitalize;
        }

        .description {
            color: #444;
            font-size: 14px;
            line-height: 1.4;
            margin-top: 8px;
        }

        .rating {
            color: #b35c00;
            margin-top: 8px;
        }

        #status {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Products</h1>
    <p id="status">Loading products...</p>
    <div class="products" id="products"></div>

    <script>
        const productList = document.getElementById("products");
        const statusText = document.getElementById("status");

        function shorten(text, limit) {
            if (!text) {
                return "";
            }

            return text.length > limit ? `${text.slice(0, limit)}...` : text;
        }

        function productCard(product) {
            const price = typeof product.price === "number"
                ? product.price.toFixed(2)
                : product.price;
            const rating = product.rating ? product.rating.rate : "N/A";
            const description = shorten(product.description, 100);

            return `
                <div class="card">
                    <img src="${product.image}" alt="${product.title || "Product image"}">
                    <div class="title">${product.title || "Untitled product"}</div>
                    <div class="price">$${price}</div>
                    <div class="category">${product.category || "Uncategorized"}</div>
                    <div class="description">${description}</div>
                    <div class="rating">Rating: ${rating}</div>
                </div>
            `;
        }

        async function loadProducts() {
            try {
                const response = await fetch("https://fakestoreapi.com/products");

                if (!response.ok) {
                    throw new Error("Product request failed");
                }

                const products = await response.json();
                productList.innerHTML = products.map(productCard).join("");
                statusText.textContent = "";
            } catch (error) {
                statusText.textContent = "Could not load products.";
                console.error(error);
            }
        }

        loadProducts();
    </script>
</body>
</html>
