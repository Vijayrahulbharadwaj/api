<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #joke {
            margin-top: 20px;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <h1>Random Joke</h1>
        <button type="button" onclick="loadJoke()">Get a Joke</button>
        <p id="joke">Click the button for a joke.</p>
    </main>

    <script>
        const jokeBox = document.getElementById("joke");

        async function loadJoke() {
            jokeBox.textContent = "Loading...";

            try {
                const response = await fetch("https://official-joke-api.appspot.com/random_joke");

                if (!response.ok) {
                    throw new Error("Joke request failed");
                }

                const joke = await response.json();
                jokeBox.innerHTML = `<strong>${joke.setup}</strong><br>${joke.punchline}`;
            } catch (error) {
                jokeBox.textContent = "Could not load a joke right now.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
