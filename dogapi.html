<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog API</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        img{
            width: 300px;
            height: 300px;
            object-fit: cover;
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        button{
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <button onclick="dogdata()">Get Dog</button>

    <br>

    <img src="" id="dogimg">

    <script>
        async function dogdata() {

            try {

                const response = await fetch(
                    "https://dog.ceo/api/breeds/image/random"
                );

                if (!response.ok) {
                    throw new Error("Data fetch failed");
                }

                const data = await response.json();

                const imageElement = document.getElementById("dogimg");

                imageElement.src = data.message;

            } catch (err) {
                console.log(err);
            }
        }
    </script>

</body>
</html>
