<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Dog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        #message {
            min-height: 24px;
        }
    </style>
</head>
<body>
    <h1>Random Dog</h1>
    <button type="button" onclick="loadDog()">Get Dog</button>

    <p id="message"></p>
    <img id="dogImage" src="" alt="Random dog">

    <script>
        const dogImage = document.getElementById("dogImage");
        const message = document.getElementById("message");

        async function loadDog() {
            message.textContent = "Loading...";

            try {
                const response = await fetch("https://dog.ceo/api/breeds/image/random");

                if (!response.ok) {
                    throw new Error("Dog image request failed");
                }

                const dog = await response.json();
                dogImage.src = dog.message;
                message.textContent = "";
            } catch (error) {
                message.textContent = "Could not load a dog image.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
